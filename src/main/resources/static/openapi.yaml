openapi: 3.0.3
info:
  title: Relay Controller API
  version: v1
  description: Control plane APIs for DevBridge relay tunnels. Relay Controller does not forward traffic.
servers:
  - url: http://localhost:8080
tags:
  - name: Tunnel
  - name: Token
  - name: Metering
  - name: Relay Status
  - name: Tunnel Port
  - name: Gateway Tunnel Port
paths:
  /open-api-inner/v1/relay-controller/tunnel:
    post:
      tags: [Tunnel]
      summary: Create tunnel
      operationId: createTunnel
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTunnelRequest'
      responses:
        '200':
          description: Created tunnel metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTunnelResult'
    get:
      tags: [Tunnel]
      summary: Get tunnel detail
      operationId: getTunnelDetail
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/TunnelIdQuery'
      responses:
        '200':
          description: Tunnel metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TunnelDetailResult'
    put:
      tags: [Tunnel]
      summary: Update tunnel
      operationId: updateTunnel
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTunnelRequest'
      responses:
        '200':
          description: Update result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanResult'
    delete:
      tags: [Tunnel]
      summary: Soft delete tunnel
      operationId: deleteTunnel
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/TunnelIdQuery'
      responses:
        '200':
          description: Delete result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanResult'
  /open-api-inner/v1/relay-controller/tunnels:
    get:
      tags: [Tunnel]
      summary: List user tunnels
      operationId: listTunnels
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: gridName
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: User tunnel list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TunnelListResult'
  /open-api-inner/v1/relay-controller/grids/{gridName}/metering:
    post:
      tags: [Metering]
      summary: Report tunnel traffic usage
      operationId: reportMetering
      parameters:
        - $ref: '#/components/parameters/GridNamePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeteringReportRequest'
      responses:
        '200':
          description: Metering acceptance result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeteringReportResult'
  /open-api-inner/v1/relay-controller/tunnel/status:
    get:
      tags: [Relay Status]
      summary: Get tunnel runtime relay status
      operationId: getRelayStatus
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/TunnelIdQuery'
      responses:
        '200':
          description: Relay runtime status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelayStatusResult'
  /open-api-inner/v1/relay-controller/tunnels/{tunnelId}/ports:
    post:
      tags: [Tunnel Port]
      summary: Create tunnel port policy
      operationId: createTunnelPort
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/TunnelIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTunnelPortRequest'
      responses:
        '200':
          description: Created tunnel port policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TunnelPortResult'
    get:
      tags: [Tunnel Port]
      summary: List tunnel port policies
      operationId: listTunnelPorts
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/TunnelIdPath'
      responses:
        '200':
          description: Tunnel port policy list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TunnelPortListResult'
  /open-api-inner/v1/relay-controller/tunnels/{tunnelId}/ports/{port}:
    get:
      tags: [Tunnel Port]
      summary: Get tunnel port policy
      operationId: getTunnelPort
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/TunnelIdPath'
        - $ref: '#/components/parameters/PortPath'
      responses:
        '200':
          description: Tunnel port policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TunnelPortResult'
    put:
      tags: [Tunnel Port]
      summary: Update tunnel port policy
      operationId: updateTunnelPort
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/TunnelIdPath'
        - $ref: '#/components/parameters/PortPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTunnelPortRequest'
      responses:
        '200':
          description: Updated tunnel port policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TunnelPortResult'
    delete:
      tags: [Tunnel Port]
      summary: Delete tunnel port policy
      operationId: deleteTunnelPort
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/TunnelIdPath'
        - $ref: '#/components/parameters/PortPath'
      responses:
        '200':
          description: Delete result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanResult'
  /open-api-inner/v1/relay-controller/grids/{gridName}/tunnels/{tunnelId}/ports/{port}:
    get:
      tags: [Gateway Tunnel Port]
      summary: Get gateway tunnel port policy
      operationId: getGatewayTunnelPortPolicy
      parameters:
        - $ref: '#/components/parameters/GridNamePath'
        - $ref: '#/components/parameters/TunnelIdPath'
        - $ref: '#/components/parameters/PortPath'
      responses:
        '200':
          description: Gateway tunnel port policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayTunnelPortPolicyResult'
  /open-api-inner/v1/relay-controller/tokens:
    post:
      tags: [Token]
      summary: Create token
      description: Creates or reuses a tunnel token by tunnelId and optionally checks X-User-Id namespace.
      operationId: createToken
      parameters:
        - name: X-User-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRtTokenRequest'
      responses:
        '200':
          description: Reusable token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRtTokenResult'
components:
  parameters:
    UserIdHeader:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
    TunnelIdQuery:
      name: tunnelId
      in: query
      required: true
      schema:
        type: string
    TunnelIdPath:
      name: tunnelId
      in: path
      required: true
      schema:
        type: string
    GridNamePath:
      name: gridName
      in: path
      required: true
      schema:
        type: string
    PortPath:
      name: port
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ResultBase:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          format: int32
          example: 0
        message:
          type: string
          example: success
    BooleanResult:
      allOf:
        - $ref: '#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              type: boolean
    CreateTunnelResult:
      allOf:
        - $ref: '#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Tunnel'
    TunnelDetailResult:
      allOf:
        - $ref: '#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Tunnel'
    TunnelListResult:
      allOf:
        - $ref: '#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/TunnelListItem'
    MeteringReportResult:
      allOf:
        - $ref: '#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MeteringReportResponse'
    RelayStatusResult:
      allOf:
        - $ref: '#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RelayStatusResponse'
    CreateRtTokenResult:
      allOf:
        - $ref: '#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/TokenResponse'
    TunnelPortResult:
      allOf:
        - $ref: '#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/TunnelPortResponse'
    TunnelPortListResult:
      allOf:
        - $ref: '#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/TunnelPortResponse'
    GatewayTunnelPortPolicyResult:
      allOf:
        - $ref: '#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/GatewayTunnelPortPolicyResponse'
    CreateTunnelRequest:
      type: object
      required: [name, gridname]
      properties:
        name:
          type: string
          maxLength: 128
        description:
          type: string
          maxLength: 512
        gridname:
          type: string
          description: Grid name. JSON also accepts gridName.
        cluster:
          type: string
        expiration:
          type: integer
          format: int32
          description: Unix seconds.
        type:
          type: string
          enum: [bridge, env]
          default: bridge
    UpdateTunnelRequest:
      type: object
      required: [tunnelId]
      properties:
        tunnelId:
          type: string
        name:
          type: string
          maxLength: 128
        description:
          type: string
          maxLength: 512
        cluster:
          type: string
        expiration:
          type: integer
          format: int32
        type:
          type: string
          enum: [bridge, env]
    MeteringReportRequest:
      type: object
      required: [tunnelCode, tunnelId, usage]
      properties:
        tunnelCode:
          type: integer
          format: int64
        tunnelId:
          type: string
        usage:
          type: integer
          format: int64
          minimum: 0
    CreateRtTokenRequest:
      type: object
      properties:
        tunnelId:
          type: string
    CreateTunnelPortRequest:
      type: object
      required: [port, allowAnonymous]
      properties:
        port:
          type: integer
          format: int64
          minimum: 1
          maximum: 65535
        allowAnonymous:
          type: boolean
    UpdateTunnelPortRequest:
      type: object
      required: [allowAnonymous]
      properties:
        allowAnonymous:
          type: boolean
    Tunnel:
      type: object
      properties:
        name:
          type: string
        id:
          type: string
        tunnelId:
          type: string
        tunnelCode:
          type: integer
          format: int64
        gridname:
          type: string
        cluster:
          type: string
        description:
          type: string
        bandwidthUsed:
          type: integer
          format: int64
        expiration:
          type: integer
          format: int32
        created:
          type: integer
          format: int64
        url:
          type: string
        type:
          type: string
          enum: [bridge, env]
    TunnelListItem:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        created:
          type: integer
          format: int64
        url:
          type: string
    MeteringReportResponse:
      type: object
      properties:
        accepted:
          type: boolean
    RelayStatusResponse:
      type: object
      properties:
        tunnelId:
          type: string
        status:
          type: string
        gridname:
          type: string
        nodeId:
          type: string
        gatewayIp:
          type: string
        lastHeartbeat:
          type: integer
          format: int64
    TokenResponse:
      type: object
      properties:
        tokenType:
          type: string
          enum: [RT]
        token:
          type: string
        expiresIn:
          type: integer
          format: int64
    TunnelPortResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        tunnelId:
          type: string
        tunnelCode:
          type: integer
          format: int64
        port:
          type: integer
          format: int64
        allowAnonymous:
          type: boolean
    GatewayTunnelPortPolicyResponse:
      type: object
      properties:
        tunnelId:
          type: string
        tunnelCode:
          type: integer
          format: int64
        gridname:
          type: string
        port:
          type: integer
          format: int64
        allowAnonymous:
          type: boolean
