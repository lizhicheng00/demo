server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: true
    bundle: mtls
    client-auth: need

spring:
  ssl:
    bundle:
      jks:
        mtls:
          keystore:
            location: base64:${MTLS_KEYSTORE_BASE64}
            password: ${MTLS_KEYSTORE_PASSWORD}
            type: PKCS12
          truststore:
            location: base64:${MTLS_TRUSTSTORE_BASE64}
            password: ${MTLS_TRUSTSTORE_PASSWORD}
            type: PKCS12
