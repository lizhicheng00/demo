server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: demo
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:demo}
    password: ${MYSQL_PASSWORD:demo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    issuer: demo
    secret: ${APP_JWT_SECRET:demo-local-development-secret-please-change}
    ttl: ${APP_JWT_TTL:PT2H}
  admin:
    seed-enabled: ${APP_ADMIN_SEED_ENABLED:true}
    username: ${APP_ADMIN_USERNAME:admin}
    password: ${APP_ADMIN_PASSWORD:admin123}
