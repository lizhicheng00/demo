server:
  port: 8080

spring:
  application:
    name: relay-controller
  main:
    banner-mode: off
    log-startup-info: false
  profiles:
    active: dev,mtls
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
  data:
    redis:
      client-type: jedis
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD}
      timeout: 3000ms

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.huawei.devbridge.relaycontroller.infrastructure.persistence.entity
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: WARN
    com.baomidou.mybatisplus.core.toolkit.Sequence: OFF
    org.flywaydb.core.internal.database.base.Database: ERROR
    com.huawei.devbridge.relaycontroller.RelayControllerApplication: INFO
    com.huawei.devbridge.relaycontroller.application.service: INFO
    com.huawei.devbridge.relaycontroller.common.exception: WARN

wushan:
  integration:
    auth:
      new-resource-tag-check-enabled: true
  security:
    validator:
      enabled: false
  scc:
    crypto:
      enable: true
      primary-key-store-file: /opt/cloud/scc/ks/primary.ks
      standby-key-store-file: /opt/cloud/scc/ks/standby.ks
      backup-folder-name: /opt/cloud/scc/backup
      domain-count: 8
      log-path: /opt/cloud/scc/logs
      log-file: scc
      default-algorithm: ALG_AES256_GCM

relay:
  domain: myhuaweicloud.com
  region: region-a
  default-expiration-hours: 72
  tunnel:
    max-per-namespace: 10
    cleanup-retention-days: 3
    cleanup-initial-delay-ms: 3600000
    cleanup-interval-ms: 3600000
  rate-limit:
    enabled: true
    requests-per-minute: 120
  jwt:
    issuer: devbridge
    key-id: "1"
    private-key: ${RELAY_JWT_PRIVATE_KEY:}
    token:
      ttl-seconds: 86400
