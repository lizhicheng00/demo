server:
  port: 8080

spring:
  application:
    name: relay-controller
  main:
    banner-mode: off
    log-startup-info: false
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/relay_controller?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
  data:
    redis:
      client-type: jedis
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.huawei.devbridge.relaycontroller.infrastructure.persistence.entity
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: WARN
    com.baomidou.mybatisplus.core.toolkit.Sequence: OFF
    org.flywaydb.core.internal.database.base.Database: ERROR
    com.huawei.devbridge.relaycontroller.RelayControllerApplication: INFO
    com.huawei.devbridge.relaycontroller.application.service: INFO
    com.huawei.devbridge.relaycontroller.common.exception: WARN

relay:
  domain: relayprovider.xxx.com
  region: region-a
  default-expiration-hours: 72
  jwt:
    issuer: devbridge
    key-id: "1"
    private-key:
    token:
      ttl-seconds: 86400
